<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">  
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Life Dashboard</h1>
        <p>12th May, 2026</p>
    </header>

    <main class="panels">

        <section id="tasks">
            <div class="header-row">
                <h2>Tasks</h2>
                <button id="add-task-btn">Add Task</button>
            </div>

            <!-- Task Modal -->
            <div id="task-modal" class="modal">
                <div class="modal-content">
                    <span class="close" id="close-modal">&times;</span>
                    <h2>Add Task</h2>
                    <input id="task-input" type="text" placeholder="New Task..." />
                    <div class="modal-actions">
                        <button id="save-task-btn">Save</button>
                    </div>
                </div>
            </div>

            <ul id="task-list">
                <!-- TODO: Add delete functionality -->
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="task-text">Gym at 8pm</span>
                        <span class="delete-task">
                            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                <path d="M6 6L18 18M18 6L6 18"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"/>
                            </svg>
                        </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="task-text">Finish coding practice</span>
                        <span class="delete-task">
                            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                <path d="M6 6L18 18M18 6L6 18"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"/>
                            </svg>
                        </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="task-text">Grocery shopping</span>
                        <span class="delete-task">
                            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                <path d="M6 6L18 18M18 6L6 18"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"/>
                            </svg>
                        </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="task-text">Meal prep</span>
                        <span class="delete-task">
                            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                <path d="M6 6L18 18M18 6L6 18"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"/>
                            </svg>
                        </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="task-text">Read 20 pages</span>
                        <span class="delete-task">
                            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                                <path d="M6 6L18 18M18 6L6 18"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"/>
                            </svg>
                        </span>
                    </label>
                </li>
            </ul>
        </section>
    
        <section id="habits">
            <div class="header-row">
                <h2>Habits</h2>
            </div>
            <div class="habit">
                <span class="habit-name">Exercise</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>

                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
            <div class="habit">
                <span class="habit-name">Read</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>
                    
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
            <div class="habit">
                <span class="habit-name">Code</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>
                    
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
        </section>
    
        <section id="notes">
            <div class="header-row">
                <h2>Notes</h2>
            </div>
            <textarea placeholder="Somethings"></textarea>
        </section>
    </main>


    <footer>
        <p>Tim Mc - Built with HTML & CSS</p>
    </footer>
</body>
</html>
