<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">  
   
</head>
<body>
    <header>
        <h1>Life Dashboard</h1>
        <p>12th May, 2026</p>
    </header>

    <main class="panels">

        <section id="tasks">
            <h2>Tasks</h2>
            <ul id="task-list">
                <li><label><input type="checkbox"> Gym at 8pm</label></li>
                <li><label><input type="checkbox"> Finish coding practice</label></li>
                <li><label><input type="checkbox"> Grocery shopping</label></li>
                <li><label><input type="checkbox"> Meal prep</label></li>
                <li><label><input type="checkbox"> Read 20 pages</label></li>
            </ul>
        </section>
    
        <section id="habits">
            <h2>Habits</h2>
            <div class="habit">
                <span class="habit-name">Exercise</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>

                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
            <div class="habit">
                <span class="habit-name">Read</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>
                    
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
            <div class="habit">
                <span class="habit-name">Code</span>
                <div class="habit-days">
                    <span class="day-label">Mon</span>
                    <span class="day-label">Tue</span>
                    <span class="day-label">Wed</span>
                    <span class="day-label">Thu</span>
                    <span class="day-label">Fri</span>
                    <span class="day-label">Sat</span>
                    <span class="day-label">Sun</span>
                    
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                    <span class="day-cell"></span>
                </div>
            </div>
        </section>
    
        <section id="notes">
            <h2>Notes</h2>
            <textarea placeholder="Somethings"></textarea>
        </section>
    </main>


    <footer>
        <p>Tim Mc - Built with HTML & CSS</p>
    </footer>
</body>
</html>
