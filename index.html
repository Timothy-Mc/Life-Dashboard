<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">  
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Life Dashboard</h1>
        <p>12th May, 2026</p>
    </header>

    <main class="panels">

        <section id="tasks">
            <div class="header-row">
                <h2>Tasks</h2>
                <button id="add-task-btn">Add Task</button>
            </div>

            <ul id="task-list">
            </ul>
        </section>
    
        <section id="habits">
            <div class="header-row">
                <h2>Habits</h2>
                <button id="add-habit-btn">Add Habit</button>
            </div>

            <div id="habits-container">
            </div>
        </section>
    
        <section id="notes">
            <div class="header-row">
                <h2>Notes</h2>
            </div>
            <textarea id="note-textarea" placeholder="Keep your notes here."></textarea>
        </section>
    </main>


    <footer>
        <p>Tim Mc - Built with HTML & CSS</p>
    </footer>


    <div id="modal" class="modal">
        <div class="modal-content">
            <span  id="modal-close" class="close">&times;</span>

            <h2 id="modal-title">Title</h2>

            <input id="modal-input" type="text" placeholder="..." />

            <div class="modal-actions">
                <button id="modal-save-btn">Save</button>
            </div>
        </div>
    </div>

</body>
</html>
