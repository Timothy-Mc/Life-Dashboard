<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
</head>
<body>
    <header>
        <h1>Life Dashboard</h1>
        <p>12th May, 2026</p>
    </header>

    <section id="tasks">
        <h2>Tasks</h2>
        <ul id="task-list">
            <li><input type="checkbox"> Gym at 8pm</li>
            <li><input type="checkbox"> Finish coding practice</li>
            <li><input type="checkbox"> Grocery shopping</li>
            <li><input type="checkbox"> Meal prep</li>
            <li><input type="checkbox"> Read 20 pages</li>
        </ul>
    </section>

    <section id="habits">
        <h2>Habits</h2>
        <div class="habit-grid">
            <div>Monday</div>
            <div>Tuesday</div>
            <div>Wednesday</div>
            <div>Thursday</div>
            <div>Friday</div>
            <div>Saturday</div>
            <div>Sunday</div>

            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
            <div class="habit-cell"></div>
        </div>
    </section>

    <section id="notes">
        <h2>Notes</h2>
        <textarea placeholder="Somethings"></textarea>
    </section>


    <footer>
        Tim Mc - Built with HTML & CSS
    </footer>
</body>
</html>
